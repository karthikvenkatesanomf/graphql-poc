# ============================================================
# Bookstore GraphQL API — Schema-First Approach
# ============================================================

# ── Custom Scalars ──────────────────────────────────────────
scalar DateTime

# ── Enums ───────────────────────────────────────────────────
enum Genre {
  FICTION
  NON_FICTION
  SCIENCE
  TECHNOLOGY
  BIOGRAPHY
  HISTORY
  FANTASY
  MYSTERY
  ROMANCE
  THRILLER
  ACTION
}

enum BookStatus {
  PUBLISHED
  DRAFT
  OUT_OF_PRINT
  UPCOMING
}

# ── Object Types ────────────────────────────────────────────
type Author {
  id: ID!
  name: String!
  bio: String
  birthDate: DateTime
  nationality: String
  books: [Book!]!
}

type Book {
  id: ID!
  title: String!
  description: String
  price: Float!
  isbn: String!
  authorId: ID!
  author: Author!
  genre: Genre!
  status: BookStatus!
  publishedDate: DateTime
  rating: Float
  pages: Int
}

# ── Input Types ─────────────────────────────────────────────
input AuthorInput {
  id: ID
  name: String
  bio: String
  birthDate: DateTime
  nationality: String
}

input CreateAuthorInput {
  name: String!
  bio: String
  birthDate: DateTime
  nationality: String
}

input CreateBookInput {
  id: String!
  title: String!
  description: String
  price: Float!
  isbn: String!
  authorId: ID!
  genre: Genre!
  status: BookStatus = DRAFT
  publishedDate: DateTime
  rating: Float
  pages: Int
}

# ── Queries ─────────────────────────────────────────────────
type Query {
  author(input: AuthorInput): [Author]
  book(id: ID!): Book
  authors: [Author!]!
  allBooks: [Book!]!
  booksByAuthor(authorId: ID!): [Book!]!
  booksByGenre(genre: Genre!): [Book!]!
  createBook(input: CreateBookInput!): Book!
  updateBook(id: ID!, price: Float!): Book!
}

# ── Mutations ───────────────────────────────────────────
type Mutation {
  createAuthor(input: CreateAuthorInput!): Author!
  createBook(input: CreateBookInput!): Book!
  updateBook(id: ID!, price: Float!): Book!
}

